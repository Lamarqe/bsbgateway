[gateway]
loglevel = INFO
device = broetje_isr_plus

[adapter]
adapter_device = /dev/ttyUSB0
port_baud = 4800
port_stopbits = 1
port_parity = odd
invert_bytes = True
expect_cts_state = None
write_retry_time = 0.005
min_wait_s = 0.1

[web_interface]
enable = True
port = 8082
bsb_address = 25
web_dashboard = [
                    [ 700, 710, 8005, 8310, 8314],
                    [ 1620, 1610, 8830, None, 8700]
                ]

[cmd_interface]
enable = True
bsb_address = 24

[loggers]
; 8510 Kollektortemperatur
; 8700 Außentemperatur
field_disp_ids = [8510, 8700]
intervals = [5, 300]
bsb_address = 23

